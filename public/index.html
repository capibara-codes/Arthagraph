<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArthaGraph | IKS Explorer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #e94560, #f5af19);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.3rem;
            color: #a0a0a0;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        .divider {
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, #e94560, #f5af19);
            margin: 0 auto 40px;
            border-radius: 2px;
        }

        #results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #e94560, #f5af19);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
            margin-bottom: 8px;
        }

        .modern {
            font-size: 1.8rem;
            font-weight: 600;
            color: #f5af19;
            display: block;
            margin-bottom: 15px;
        }

        .connector {
            font-size: 0.9rem;
            color: #888;
            margin: 10px 0;
        }

        .ancient {
            font-size: 1.4rem;
            font-weight: 500;
            color: #e94560;
            display: block;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(233, 69, 96, 0.2);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            color: #888;
            font-size: 1rem;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏛️ ArthaGraph</h1>
        <p class="subtitle">Connecting Ancient Trade to Modern FinTech</p>
        <div class="divider"></div>
        <div id="results">
            <div class="loading">
                <div class="spinner"></div>
                <p class="loading-text">Loading graph data...</p>
            </div>
        </div>
    </div>

    <script>
        async function fetchData() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                const div = document.getElementById('results');
                div.innerHTML = '';
                
                if (!data || data.length === 0) {
                    div.innerHTML = '<div class="empty-state">No data available</div>';
                    return;
                }
                
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <span class="card-label">Modern</span>
                        <span class="modern">${item.modern}</span>
                        <span class="connector">⟶ Evolved from ⟶</span>
                        <span class="card-label">Ancient</span>
                        <span class="ancient">${item.ancient}</span>
                    `;
                    div.appendChild(card);
                });
            } catch (error) {
                document.getElementById('results').innerHTML = 
                    '<div class="empty-state">Error loading data</div>';
            }
        }
        fetchData();
    </script>
</body>
</html>
